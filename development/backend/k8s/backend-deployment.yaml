apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-node-app
  namespace: cicd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-node-app
  template:
    metadata:
      labels:
        app: demo-node-app
    spec:
      containers:
      - name: demo-node-app
        image: nexus-nexus-repository-manager.cicd.svc.cluster.local:8082/demo-node-app:v1
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: "demo-db"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASS
          value: "password"
        - name: DB_NAME
          value: "base_db"
        ports:
        - containerPort: 3000
        # Add health checks
        livenessProbe:
          httpGet:
            path: /health  # Adjust this to your app's health endpoint
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health  # Adjust this to your app's health endpoint
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        # Add resource limits
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-node-app
  namespace: cicd
spec:
  type: ClusterIP
  selector:
    app: demo-node-app
  ports:
    - port: 80
      targetPort: 3000